[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning:tortoise.fields.data",
    "ignore::DeprecationWarning:requests.utils",
]
asyncio_mode = "auto"
markers = [
    "integration: mark test as integration test (requires external services)",
    "slow: mark test as slow running",
    "awvs: mark test as requiring AWVS service",
    "ai: mark test as requiring AI model service",
    "seebug: mark test as requiring Seebug service",
    "timeout: mark test with timeout in seconds",
    "stress: mark test as stress test",
]

[tool.aerich]
tortoise_orm = "backend.config.TORTOISE_ORM"
location = "./migrations"
src_folder = "./."
